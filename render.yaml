services:
  # Main Backend Server
  - type: web
    name: enterprise-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: REDIS_HOST
        fromService:
          type: redis
          name: enterprise-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: enterprise-redis
          property: port
      - key: CLIENT_URL
        value: https://your-frontend-app.vercel.app
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false

  # Redis Cache
  - type: redis
    name: enterprise-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru
