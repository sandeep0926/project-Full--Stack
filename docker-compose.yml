version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: enterprise-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: enterprise-server
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      REDIS_HOST: redis
    ports:
      - "3000:3000"
    depends_on:
      - redis

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: enterprise-client
    restart: unless-stopped
    environment:
      # Frontend talks to API via docker host (dev) or same host in prod
      VITE_API_BASE_URL: "/api/v1"
    ports:
      - "5173:5173"
    depends_on:
      - server
