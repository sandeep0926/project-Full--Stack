# Nginx Load Balancer Configuration for Enterprise Platform

# Define upstream for API Gateway instances
upstream api_gateway {
    least_conn;  # Use least connections load balancing algorithm
    
    # Gateway instances
    server gateway-1:4000 max_fails=3 fail_timeout=30s;
    server gateway-2:4001 max_fails=3 fail_timeout=30s;
    
    # Keep connections alive
    keepalive 32;
}

# Main server block
server {
    listen 80;
    server_name localhost;
    
    # Access and error logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
    
    # Nginx health check endpoint
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Gateway health check (for monitoring)
    location /health {
        proxy_pass http://api_gateway/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Quick timeout for health checks
        proxy_connect_timeout 2s;
        proxy_read_timeout 2s;
    }
    
    # API routes - proxy to gateway
    location /api/ {
        proxy_pass http://api_gateway;
        proxy_http_version 1.1;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # Error handling
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
    }
    
    # WebSocket support for Socket.io
    location /socket.io/ {
        proxy_pass http://api_gateway;
        proxy_http_version 1.1;
        
        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Long timeouts for WebSocket connections
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
        
        # Disable buffering for WebSocket
        proxy_buffering off;
    }
    
    # Static files (if needed in future)
    location /static/ {
        alias /var/www/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Default 404
    location / {
        return 404 '{"success":false,"error":"Not Found","message":"Route not found"}\n';
        add_header Content-Type application/json;
    }
}

# Health check server (separate port for monitoring)
server {
    listen 8080;
    
    location /health {
        access_log off;
        proxy_pass http://api_gateway/health;
        proxy_connect_timeout 2s;
        proxy_read_timeout 2s;
    }
    
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
